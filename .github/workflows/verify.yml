name: verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python3 scripts/build_data.py
      - run: python3 scripts/test_build.py
      - run: node scripts/test_search.mjs
      - name: 생성물 변경 여부 확인
        run: git diff --exit-code -- site/bible.json rag/chapters.jsonl site/downloads/
